# Default values for the monitoring-stack wrapper chart.
# These values will override the defaults in the kube-prometheus-stack subchart.

kube-prometheus-stack:
  grafana:
    enabled: true
    ingress:
      enabled: true
      ingressClassName: webapprouting.kubernetes.azure.com
      path: /
      hosts: []
    persistence:
      enabled: true
      size: 10Gi
    
    # Injecting Secrets as Environment Variables
    envFromSecret: grafana-db-creds

    grafana.ini:
      database:
        type: postgres
        host: bootcamp-postgres-tmp-jkr.postgres.database.azure.com:5432
        name: grafana
        user: psqladmin
        # Referencing the environment variable injected from the secret
        password: "$__env{GF_DATABASE_PASSWORD}"
        ssl_mode: require

  prometheus:
    enabled: true
    prometheusSpec:
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 20Gi

  alertmanager:
    enabled: false # Disabled by default for simplicity in bootcamp

prometheus-postgres-exporter:
  enabled: true
  config:
    datasource:
      host: bootcamp-postgres-tmp-jkr.postgres.database.azure.com
      user: psqladmin
      # Leave password blank here as we will inject the full connection string via ENV
      password: "" 
      sslmode: require
  
  # Inject the password from the secret via environment variable
  env:
    - name: DATA_SOURCE_PASS
      valueFrom:
        secretKeyRef:
          name: grafana-db-creds
          key: GF_DATABASE_PASSWORD
  
  serviceMonitor:
    enabled: true
    namespace: monitoring
    interval: 30s
    labels:
      release: monitoring
